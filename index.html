<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دَكْدَكْلِي</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ffffff,#fff8dc,#ffd700);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    background:#fff;
    width:100%;
    max-width:450px;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 35px rgba(0,0,0,.12);
    text-align:center;
}

h1{
    color:#c89b00;
    font-size:34px;
    margin-bottom:25px;
}

.about-card{
    display:inline-block;
    background:#fffdf2;
    border:2px solid #ffe066;
    color:#8a6b00;
    padding:10px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
    margin-bottom:15px;
    transition:.3s;
}

.about-card:hover{
    background:#fff7cc;
}

#aboutBox{
    display:none;
    background:#fffdf2;
    border:2px solid #ffe066;
    border-radius:12px;
    padding:12px;
    margin-bottom:15px;
    text-align:right;
    line-height:1.8;
    color:#444;
    font-size:14px;
}

.main-btn,
.back-btn,
.submit-btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:17px;
    cursor:pointer;
    margin-top:10px;
}

.main-btn{
    background:#ffd700;
    color:#333;
    font-weight:bold;
}

.submit-btn{
    background:#ffd700;
    color:#333;
    font-weight:bold;
}

.back-btn{
    background:#efefef;
    color:#444;
}

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:2px solid #ffe066;
    border-radius:12px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#ffd700;
}

#form{
    display:none;
}
</style>
</head>
<body>

<div class="box">

    <div id="aboutSection">

        <div class="about-card" onclick="toggleAbout()">
            نبذة عن دَكْدَكْلِي
        </div>

        <div id="aboutBox">
            دَكْدَكْلِي منصة تساعد على حل مشكلة نقص الفكة في التعاملات اليومية،
            عبر تسهيل معرفة المبلغ المتبقي عند تفكيك الأوراق النقدية.
        </div>

    </div>

    <h1>دَكْدَكْلِي</h1>

    <div id="start">
        <button class="main-btn" onclick="showForm()">
            دَكْدَكْلِي
        </button>
    </div>

    <form id="form">

        <button type="button" class="back-btn" onclick="goBack()">
            ← رجوع
        </button>

        <input type="number" placeholder="أدخل الرقم" required>

        <input type="number" placeholder="أدخل المبلغ المطلوب" required>

        <button type="submit" class="submit-btn">
            متابعة
        </button>

    </form>

</div>

<script>
function toggleAbout(){
    const about = document.getElementById("aboutBox");

    if(about.style.display === "block"){
        about.style.display = "none";
    }else{
        about.style.display = "block";
    }
}

function showForm(){
    document.getElementById("aboutSection").style.display = "none";
    document.getElementById("start").style.display = "none";
    document.getElementById("form").style.display = "block";
}

function goBack(){
    document.getElementById("form").style.display = "none";
    document.getElementById("aboutSection").style.display = "block";
    document.getElementById("aboutBox").style.display = "none";
    document.getElementById("start").style.display = "block";
}

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();
    alert("تم استلام الطلب بنجاح");
});
</script>

</body>
</html>
